<!DOCTYPE html>
<html>

<head>

    <title>Outfit Planner</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="home-page">

        <div class="left-side">

            <h1>Outfit Planner</h1>

            <p>
                Organize your outfits, upload fashion looks,
                filter styles and get outfit recommendations.
            </p>

            <div class="home-buttons">

                <a href="/add">
                    <button>Add Outfit</button>
                </a>

                <a href="/outfits">
                    <button>View Outfits</button>
                </a>

                <a href="/filter">
                    <button>Filter Outfits</button>
                </a>

                <a href="/recommend">
                    <button>Choose Outfit</button>
                </a>

            </div>

        </div>

        <div class="right-side">

            <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=800"
                 class="home-img">

            <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=800"
                 class="home-img small">

        </div>

    </div>

</body>
    
</html>
